apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-gateway
  labels:
    app.kubernetes.io/name: ingest-gateway
    app.kubernetes.io/part-of: nats-ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest-gateway
        app.kubernetes.io/part-of: nats-ingest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /actuator/prometheus
    spec:
      containers:
        - name: gateway
          # TODO(deploy): point at your registry/tag; one image serves every role.
          image: nats-api-springboot-starter:latest
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: gateway
            - name: NATS_URL
              value: nats://nats.nats.svc:4222
            # TODO(auth): static bearer token skeleton — replace with the real
            # authenticator (see GatewayAuthenticator SPI) before internet exposure.
            - name: APP_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ingest-gateway
                  key: token
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
