spring:
  application:
    name: nats-api-springboot-starter
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/ingest}
    username: ${DB_USERNAME:ingest}
    password: ${DB_PASSWORD:ingest}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  namespaces:
    # Switch semantics: a namespace not listed here is business-wise not collected.
    # Messages for it are ACKed and dropped by the worker, and it is absent from the API.
    enabled: ${APP_NAMESPACES_ENABLED:alpha,beta}

management:
  endpoints:
    web:
      exposure:
        include: health,info
