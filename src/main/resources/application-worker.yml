app:
  composition:
    retention: ${APP_COMPOSITION_RETENTION:7d}
    sweep-interval: ${APP_COMPOSITION_SWEEP_INTERVAL:60s}
  ledger:
    # Must stay longer than the longest stream replay window — see IngestLedgerProperties.
    retention: ${APP_LEDGER_RETENTION:30d}
    sweep-interval: ${APP_LEDGER_SWEEP_INTERVAL:1h}
  sources:
    # Switch semantics: this worker subscribes only the sources listed here.
    # Deployments set APP_SOURCES_ENABLED per route (e.g. "source-a").
    enabled: ${APP_SOURCES_ENABLED:source-a,source-b,source-http,source-ftp}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
    sources:
      source-a:
        stream: SRC_A_EVENTS
        subject: src-a.events.>
        durable: ingest-worker-src-a
      source-b:
        stream: SRC_B_EVENTS
        subject: src-b.events.>
        durable: ingest-worker-src-b
      source-http:
        stream: SRC_HTTP_EVENTS
        subject: src-http.events.>
        durable: ingest-worker-src-http
      source-ftp:
        stream: SRC_FTP_EVENTS
        subject: src-ftp.events.>
        durable: ingest-worker-src-ftp
