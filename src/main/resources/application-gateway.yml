spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

server:
  port: ${SERVER_PORT:8080}

app:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  gateway:
    token: ${APP_GATEWAY_TOKEN:}
    ftp:
      enabled: ${APP_FTP_ENABLED:false}
      host: ${APP_FTP_HOST:localhost}
      port: ${APP_FTP_PORT:21}
      username: ${APP_FTP_USERNAME:}
      password: ${APP_FTP_PASSWORD:}
      inbox-dir: ${APP_FTP_INBOX_DIR:/inbox}
      processing-dir: ${APP_FTP_PROCESSING_DIR:/processing}
      archive-dir: ${APP_FTP_ARCHIVE_DIR:/archive}
      error-dir: ${APP_FTP_ERROR_DIR:/error}
      poll-interval: ${APP_FTP_POLL_INTERVAL:30s}
