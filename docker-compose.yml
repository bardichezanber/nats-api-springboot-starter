# Local development infrastructure. Run the app itself from your IDE or CLI:
#   SPRING_PROFILES_ACTIVE=worker ./mvnw spring-boot:run
#   SPRING_PROFILES_ACTIVE=api    ./mvnw spring-boot:run
services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ingest
      MARIADB_USER: ingest
      MARIADB_PASSWORD: ingest
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
