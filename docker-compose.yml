# Local development infrastructure. Run the app itself from your IDE or CLI:
#   SPRING_PROFILES_ACTIVE=worker ./mvnw spring-boot:run
#   SPRING_PROFILES_ACTIVE=api    ./mvnw spring-boot:run
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ingest
      POSTGRES_USER: ingest
      POSTGRES_PASSWORD: ingest
    ports:
      - "5432:5432"

  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
